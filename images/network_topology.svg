<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>orange — network mode topology</title>

  <text x="500" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#111">
    Network mode topology — 1 GUI host + 2 capture servers + 8 cameras
  </text>

  <!-- Camera group labels -->
  <text x="210" y="62" text-anchor="middle" font-size="12" fill="#555">cameras attached to server 1</text>
  <text x="790" y="62" text-anchor="middle" font-size="12" fill="#555">cameras attached to server 2</text>

  <!-- Cameras: 8 boxes total, 4 left + 4 right -->
  <g stroke="#333" stroke-width="1.5" fill="#fff">
    <rect x="60"  y="75" width="60" height="40" rx="4"/>
    <rect x="140" y="75" width="60" height="40" rx="4"/>
    <rect x="220" y="75" width="60" height="40" rx="4"/>
    <rect x="300" y="75" width="60" height="40" rx="4"/>
    <rect x="640" y="75" width="60" height="40" rx="4"/>
    <rect x="720" y="75" width="60" height="40" rx="4"/>
    <rect x="800" y="75" width="60" height="40" rx="4"/>
    <rect x="880" y="75" width="60" height="40" rx="4"/>
  </g>
  <g font-size="12" fill="#111" text-anchor="middle">
    <text x="90"  y="100">Cam</text>
    <text x="170" y="100">Cam</text>
    <text x="250" y="100">Cam</text>
    <text x="330" y="100">Cam</text>
    <text x="670" y="100">Cam</text>
    <text x="750" y="100">Cam</text>
    <text x="830" y="100">Cam</text>
    <text x="910" y="100">Cam</text>
  </g>

  <!-- Camera-to-switch links -->
  <g stroke="#666" stroke-width="1.5" fill="none">
    <line x1="90"  y1="115" x2="120" y2="220"/>
    <line x1="170" y1="115" x2="170" y2="220"/>
    <line x1="250" y1="115" x2="220" y2="220"/>
    <line x1="330" y1="115" x2="270" y2="220"/>
    <line x1="670" y1="115" x2="730" y2="220"/>
    <line x1="750" y1="115" x2="780" y2="220"/>
    <line x1="830" y1="115" x2="830" y2="220"/>
    <line x1="910" y1="115" x2="880" y2="220"/>
  </g>

  <!-- PTP-capable switch -->
  <rect x="40" y="220" width="920" height="70" rx="6" fill="#fef3e2" stroke="#d97706" stroke-width="2"/>
  <text x="500" y="252" text-anchor="middle" font-size="16" font-weight="bold" fill="#9a3412">
    PTP-capable switch
  </text>
  <text x="500" y="275" text-anchor="middle" font-size="12" fill="#9a3412">
    grandmaster — keeps all cameras synchronized to sub-frame precision
  </text>

  <!-- Switch-to-host links -->
  <g stroke="#666" stroke-width="1.5" fill="none">
    <line x1="160" y1="290" x2="160" y2="395"/>
    <line x1="500" y1="290" x2="500" y2="395"/>
    <line x1="800" y1="290" x2="800" y2="395"/>
  </g>

  <!-- Annotation: what flows on switch <-> host links -->
  <text x="500" y="385" text-anchor="middle" font-size="11" fill="#666" font-style="italic">
    each link carries: PTP · GigE Vision frames (camera → server) · ENet control (host ↔ servers)
  </text>

  <!-- Server 1 -->
  <rect x="60" y="395" width="200" height="130" rx="6" fill="#f3f4f6" stroke="#333" stroke-width="2"/>
  <text x="160" y="420" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">Server 1</text>
  <text x="160" y="438" text-anchor="middle" font-size="11" fill="#555">cam_server waffle-0</text>
  <rect x="100" y="455" width="120" height="50" rx="4" fill="#fff" stroke="#888"/>
  <text x="160" y="476" text-anchor="middle" font-size="11" fill="#111">local disk</text>
  <text x="160" y="493" text-anchor="middle" font-size="11" fill="#555">encoded video</text>

  <!-- GUI host -->
  <rect x="400" y="395" width="200" height="130" rx="6" fill="#fef3e2" stroke="#d97706" stroke-width="2"/>
  <text x="500" y="420" text-anchor="middle" font-size="14" font-weight="bold" fill="#9a3412">GUI host</text>
  <text x="500" y="438" text-anchor="middle" font-size="11" fill="#9a3412">orange</text>
  <text x="500" y="475" text-anchor="middle" font-size="11" fill="#9a3412">controls servers,</text>
  <text x="500" y="491" text-anchor="middle" font-size="11" fill="#9a3412">no cameras attached</text>

  <!-- Server 2 -->
  <rect x="700" y="395" width="200" height="130" rx="6" fill="#f3f4f6" stroke="#333" stroke-width="2"/>
  <text x="800" y="420" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">Server 2</text>
  <text x="800" y="438" text-anchor="middle" font-size="11" fill="#555">cam_server waffle-1</text>
  <rect x="740" y="455" width="120" height="50" rx="4" fill="#fff" stroke="#888"/>
  <text x="800" y="476" text-anchor="middle" font-size="11" fill="#111">local disk</text>
  <text x="800" y="493" text-anchor="middle" font-size="11" fill="#555">encoded video</text>

  <!-- Caption -->
  <text x="500" y="565" text-anchor="middle" font-size="12" fill="#333">
    Adding more capture servers (and more cameras per server) is the path to scaling beyond what one host can drive.
  </text>
  <text x="500" y="585" text-anchor="middle" font-size="12" fill="#333">
    The GUI host connects to servers listed in <tspan font-family="monospace">orange_data/config/network/endpoints.json</tspan>.
  </text>

  <!-- Legend -->
  <g transform="translate(330, 615)" font-size="11" fill="#555">
    <line x1="0" y1="-4" x2="24" y2="-4" stroke="#666" stroke-width="1.5"/>
    <text x="32" y="0">network link (Ethernet)</text>
    <rect x="200" y="-12" width="14" height="14" rx="2" fill="#fef3e2" stroke="#d97706" stroke-width="1.5"/>
    <text x="222" y="0">orange components</text>
  </g>
</svg>
